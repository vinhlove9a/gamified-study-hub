services:
  postgres:
    image: postgres:16-alpine
    container_name: gsh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamified_study_hub}
      POSTGRES_USER: ${POSTGRES_USER:-gsh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gsh_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gsh_user} -d ${POSTGRES_DB:-gamified_study_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gsh-network

  redis:
    image: redis:7-alpine
    container_name: gsh-redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$${REDIS_PASSWORD}\" ];
      then redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\";
      else redis-server --appendonly yes;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG; else redis-cli ping | grep PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gsh-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: gsh-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: "${APP_NAME:-Gamified Study Hub}"
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-30}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-Lax}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@aquvix.site}
      MAIL_BASE_URL: ${MAIL_BASE_URL:-${FRONTEND_ORIGIN:-http://localhost:5173}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-gamified_study_hub}
      POSTGRES_USER: ${POSTGRES_USER:-gsh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gsh_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gsh-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        # Empty/relative by default so the SPA issues same-origin requests like
        # `/api/v1/auth/login`, which nginx proxies to the backend. authApi.ts
        # already includes the `/api/v1` prefix, so a non-empty base here would
        # double it (e.g. http://host/api/api/v1/...). Override only when the API
        # lives on a different origin than the frontend.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
    container_name: gsh-frontend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: "${APP_NAME:-Gamified Study Hub}"
    depends_on:
      - backend
    networks:
      - gsh-network

  nginx:
    image: nginx:1.27-alpine
    container_name: gsh-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gsh-network

volumes:
  postgres_data:
  redis_data:

networks:
  gsh-network:
    driver: bridge
