spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gamified_study_hub}
    username: ${POSTGRES_USER:gsh_user}
    password: ${POSTGRES_PASSWORD:gsh_password}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id-for-local-dev}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret-for-local-dev}
            scope: openid,email,profile
