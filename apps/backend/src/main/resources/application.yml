spring:
  application:
    name: gamified-study-hub-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
  mvc:
    throw-exception-if-no-handler-found: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

server:
  port: ${BACKEND_PORT:8080}
  # Honour X-Forwarded-* from the trusted Caddy proxy (so HTTPS-only headers
  # like HSTS and Secure-cookie detection work behind TLS termination).
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
  cookie:
    domain: ${COOKIE_DOMAIN:}
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAMESITE:Lax}
  mail:
    from: ${MAIL_FROM:no-reply@aquvix.site}
    # Base URL used to build verify/reset links in emails (the public site).
    base-url: ${MAIL_BASE_URL:${FRONTEND_ORIGIN:http://localhost:5173}}
  security:
    ratelimit:
      ip-per-minute: ${AUTH_RL_IP_PER_MIN:30}
      account-per-window: ${AUTH_RL_ACCOUNT:5}
      account-window-seconds: ${AUTH_RL_ACCOUNT_WINDOW:900}
    lockout:
      max-attempts: ${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
      base-lock-seconds: ${AUTH_LOCKOUT_BASE_SECONDS:60}
      max-tier: ${AUTH_LOCKOUT_MAX_TIER:5}
