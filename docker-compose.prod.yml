# =============================================================================
# Production stack for the EC2 host — PULLS prebuilt images from GHCR instead
# of building locally (the 1GB box OOMs when building the frontend).
#
# Images are built & pushed by .github/workflows/deploy.yml. Deploy with:
#   IMAGE_TAG=<git-sha> docker compose -f docker-compose.prod.yml pull
#   IMAGE_TAG=<git-sha> docker compose -f docker-compose.prod.yml up -d
#
# `name:` is pinned so this reuses the SAME volumes/network as the original
# docker-compose.yml stack (project "gamified-study-hub") — DB data persists.
# Runtime config (JWT_SECRET, POSTGRES_PASSWORD, FRONTEND_ORIGIN, ...) comes
# from the .env file that already lives next to this file on the server.
# =============================================================================
name: gamified-study-hub

services:
  postgres:
    image: postgres:16-alpine
    container_name: gsh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamified_study_hub}
      POSTGRES_USER: ${POSTGRES_USER:-gsh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gsh_password}
    # No host port published in prod: only the backend (same network) needs it.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gsh_user} -d ${POSTGRES_DB:-gamified_study_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gsh-network

  redis:
    image: redis:7-alpine
    container_name: gsh-redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$${REDIS_PASSWORD}\" ];
      then redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\";
      else redis-server --appendonly yes;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG; else redis-cli ping | grep PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gsh-network

  backend:
    image: ghcr.io/vinhlove9a/gsh-backend:${IMAGE_TAG:-latest}
    container_name: gsh-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: "${APP_NAME:-Gamified Study Hub}"
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-30}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-Lax}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-gamified_study_hub}
      POSTGRES_USER: ${POSTGRES_USER:-gsh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gsh_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # Bound to localhost only — nginx reaches the backend over the compose
    # network; 127.0.0.1 keeps it usable for SSH-tunnel debugging, not public.
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gsh-network

  frontend:
    image: ghcr.io/vinhlove9a/gsh-frontend:${IMAGE_TAG:-latest}
    container_name: gsh-frontend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: "${APP_NAME:-Gamified Study Hub}"
    depends_on:
      - backend
    networks:
      - gsh-network

  # Public entrypoint: Caddy terminates TLS (auto Let's Encrypt) and reverse
  # proxies to the SPA + backend. Replaces the plain nginx proxy.
  caddy:
    image: caddy:2-alpine
    container_name: gsh-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # issued certificates + ACME account (persist!)
      - caddy_config:/config
    networks:
      - gsh-network

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  gsh-network:
    driver: bridge
